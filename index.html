<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>websiteku</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">

<div class="logo">
▶ websiteku
</div>

<div class="search">
<input type="text" placeholder="Cari video...">
</div>

</header>

<div class="container">

<div class="pagination">
<button>1</button>
<button>2</button>
<button class="active">3</button>
<button>4</button>
<button>5</button>

<button class="next-btn">
▶ Next Video
</button>
</div>

<h2 class="section-title">
🔥 Video Viral Terbaru
</h2>

<div class="video-card">

<video controls preload="metadata">
<source src="https://cdn2.sliwtdrive.com/BIYDvcux1.mp4" type="video/mp4">
</video>

<div class="action-buttons">

<button class="download-btn">
⬇ Download Video
</button>

<button class="next-video-btn">
▶ Video Berikutnya
</button>

</div>

</div>

<div class="banner">
<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=1000"
alt="banner">
</div>

</div>

</body>
</html>
